# BarkEm Configuration — Controller Input Edition
# Copy to settings.yaml and tune the D-pad sequences in-game.
#
# CALIBRATION:
#   OCR regions  → python -m barkem.tools.calibrate
#   D-pad seqs   → python -m barkem.tools.gamepad_test
#   Keyboard sim → python -m barkem.tools.keyboard_gamepad


game:
  resolution: "1920x1080"
  display_mode: "borderless"
  window_title: "THE FINALS"
  bot_embark_id: "BarkEmBot#0000"        # ← Your bot account's Embark ID


vision:
  capture_fps: 10
  template_threshold: 0.85
  ocr_upscale_factor: 3
  debug_screenshots: true
  screenshot_dir: "./debug/screenshots"
  tesseract_cmd: "C:\\Program Files\\Tesseract-OCR\\tesseract.exe"


# ── Controller timing ─────────────────────────────────────────────────────
input:
  button_delay: 0.15        # Pause between button presses (seconds)
  hold_duration: 0.05       # How long each button is held
  anchor_presses: 5         # Number of B presses for anchoring
  anchor_settle: 0.3        # Wait after anchoring
  transition_wait: 0.5      # Wait after screen transitions
  step_wait: 0.3            # Wait between placement steps


# ── Menu navigation ────────────────────────────────────────────────────
# The main menu wraps infinitely — the bot uses VISION (template
# matching on "change_game_mode_selected.png") to find the button.
#
# The game mode selection screen CAN be anchored: UP to the top,
# then DOWN to Private Match.
sequences:
  mode_anchor_up: 7          # UP presses to guarantee top of mode list
  mode_down_to_private: 7    # DOWN presses from top to Private Match
  private_to_create: ["x"]   # Private Match screen → Create Game
  lobby_start_match: ["x"]


# ── Lobby grid layout ──────────────────────────────────────────────────
# The lobby has 3 columns navigated with LEFT/RIGHT:
#   LEFT   = Match Details (dropdowns)
#   CENTER = Unassigned Players + Spectators (anchor lands here)
#   RIGHT  = Team 1 (top) + Team 2 (bottom)
#
# UP/DOWN navigates within the current column.
#
# The unassigned list is DYNAMIC: it grows as players join.
# With 1 player there are 2 rows (player + 1 empty "---" slot).
# With 8 players there are 9 rows (8 + 1 empty).
# Spectators are always directly below the last unassigned row.
# The bot counts unassigned rows via OCR at runtime.
grid:
  # Teams column (RIGHT) — row counts within the column
  team1_rows: 3
  team2_rows: 3
  gap_between_teams: 0    # extra D-pad Downs between last T1 and first T2 slot
  # (set to 0 if cursor goes straight through)

  # Context menu — "Move in Lobby" row offset
  # The bot has fewer menu items than other players, so the button
  # is at a different position.  Count D-pad Downs from menu top.
  context_move_self: 2    # for the bot's own context menu
  context_move_other: 3   # for other players' context menus


# ── Mode & map dropdown indices ───────────────────────────────────────────
# Zero-based: after opening the dropdown (A), press Down this many times.
# Dropdowns are reached via LEFT column navigation (handled by LobbyNavigator).
#
# NOTE: Variant, Condition, and Game Show options differ per map.
# Use index 0 ("ANY") as a safe default, or build per-map configs.
mode_map:
  modes:
    cashout: 0
    final_round: 1
    head2head: 2
    point_break: 3
    power_shift: 4
    quick_cash: 5
    ranked_cashout: 6
    team_deathmatch: 7

  maps:
    bernal: 0
    fangwai_city: 1
    fortune_stadium: 2
    kyoto: 3
    las_vegas: 4
    las_vegas_stadium: 5
    monaco: 6
    nozomi_citadel: 7
    seoul: 8
    skyway_stadium: 9
    sys_horizon: 10


timing:
  default_cancel_timeout: 300
  match_max_duration: 1200
  state_transition_timeout: 10
  countdown_seconds: 3
  pause_cooldown: 30.0


monitoring:
  initial_poll_interval: 60
  mid_poll_interval: 30
  late_poll_interval: 10
  late_threshold_seconds: 600
  chat_poll_interval: 1.0


api:
  host: "0.0.0.0"
  port: 8080
  webhook_timeout: 30
  webhook_retries: 3


logging:
  level: "INFO"
  file: "./logs/bot.log"
  rotation: "10 MB"
  retention: "30 days"


